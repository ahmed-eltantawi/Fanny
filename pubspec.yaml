name: finny
description: "Fanny - A digital platform connecting customers with professional home service technicians in Egypt."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  get_it: ^7.7.0
  go_router: ^14.0.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  animate_do: ^3.3.4
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  dartz: ^0.10.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  flutter_native_splash: ^2.4.3
  flutter_svg: ^2.0.10+1
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.5
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.3.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_smaller.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon_smaller.png"
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/illustrations/
